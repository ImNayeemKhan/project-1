# -----------------------------------------------------------------------------
# HTTP server block.
#
# Until you have a domain + SSL, this block happily serves everything on port 80
# and the 443 block below stays inert (NGINX ignores it if no certs are present
# because the file is commented out by default).
#
# Once you run `./infra/scripts/issue-cert.sh <your-domain>`:
#   1. Swap the two `server_name _;` lines to `server_name your-domain.com;`
#   2. Uncomment the HTTPS block and the `return 301 https://…` line in the HTTP block.
# -----------------------------------------------------------------------------

upstream isp_api { server api:4000; keepalive 32; }
upstream isp_web { server web:3000; keepalive 32; }

# ACME challenge must be reachable over HTTP even after you enable HTTPS redirect.
server {
  listen 80 default_server;
  server_name _;

  # ----- Security headers -----
  add_header X-Frame-Options            "SAMEORIGIN" always;
  add_header X-Content-Type-Options     "nosniff" always;
  add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # --- Uncomment after SSL is issued ---
  # return 301 https://$host$request_uri;

  # API → Node backend (with tighter rate limit on auth routes)
  location /api/auth/ {
    limit_req zone=auth_zone burst=10 nodelay;
    proxy_pass         http://isp_api;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  location /api/ {
    limit_req zone=api_zone burst=40 nodelay;
    proxy_pass         http://isp_api;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Next.js frontend (with websockets / HMR tolerated)
  location / {
    proxy_pass         http://isp_web;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }
}

